name: agent-flow

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_flow}
      POSTGRES_USER: ${POSTGRES_USER:-agent_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_flow_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./001_init_agent_workflow_platform_mvp.sql:/docker-entrypoint-initdb.d/001_init_agent_workflow_platform_mvp.sql:ro
      - ./002_observability_and_governance.sql:/docker-entrypoint-initdb.d/002_observability_and_governance.sql:ro
      - ./003_generated_workflow_code.sql:/docker-entrypoint-initdb.d/003_generated_workflow_code.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_flow} -d ${POSTGRES_DB:-agent_flow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_flow}:${POSTGRES_PASSWORD:-agent_flow_dev}@postgres:5432/${POSTGRES_DB:-agent_flow}
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "app",
      ]
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./storage/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker-workflow:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_flow}:${POSTGRES_PASSWORD:-agent_flow_dev}@postgres:5432/${POSTGRES_DB:-agent_flow}
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["python", "-m", "app.workers.workflow_run_worker"]
    volumes:
      - ./backend:/app
      - ./storage/uploads:/data/uploads
    depends_on:
      api:
        condition: service_healthy

  worker-document:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent_flow}:${POSTGRES_PASSWORD:-agent_flow_dev}@postgres:5432/${POSTGRES_DB:-agent_flow}
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["python", "-m", "app.workers.document_processing_worker"]
    volumes:
      - ./backend:/app
      - ./storage/uploads:/data/uploads
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
