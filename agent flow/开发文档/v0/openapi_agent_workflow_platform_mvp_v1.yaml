openapi: 3.0.3
info:
  title: Agent Workflow Platform MVP API
  version: 0.1.0
  description: MVP API draft for workflow authoring, publishing, running, tracing, knowledge bases, tools, models, and secrets.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: Workflows
  - name: Workflow Versions
  - name: Runs
  - name: Knowledge Bases
  - name: Documents
  - name: Tools
  - name: Models
  - name: Secrets
  - name: Human Approvals
  - name: Node Types
  - name: Ops
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: agent-workflow-api
                  version:
                    type: string
                    example: 0.1.0
                  uptime_seconds:
                    type: integer

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      description: Exposes workflow run, node run, Redis queue, worker heartbeat, and scrape error metrics.
      security: []
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string

  /workflows:
    post:
      tags: [Workflows]
      summary: Create workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRequest"
      responses:
        "200":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Workflows]
      summary: List workflows
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, archived]
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workflow list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflows/{workflow_id}:
    get:
      tags: [Workflows]
      summary: Get workflow detail
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      responses:
        "200":
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Workflows]
      summary: Update workflow draft
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowRequest"
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Workflows]
      summary: Soft delete workflow
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflows/{workflow_id}/validate:
    post:
      tags: [Workflows]
      summary: Validate workflow graph
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateGraphRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphValidationResult"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflows/{workflow_id}/publish:
    post:
      tags: [Workflows]
      summary: Publish workflow version
      description: >
        Publishes the current draft graph as an immutable workflow version,
        generates local workflow code under backend/generated_workflows/, and
        stores code_path, code_hash, and code_generated_at on workflow_versions.
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishWorkflowRequest"
      responses:
        "200":
          description: Published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishWorkflowResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflows/{workflow_id}/versions:
    get:
      tags: [Workflow Versions]
      summary: List workflow versions
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersionListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflow-versions/{version_id}:
    get:
      tags: [Workflow Versions]
      summary: Get workflow version detail
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersionDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflow-versions/{version_id}/code:
    get:
      tags: [Workflow Versions]
      summary: Get generated workflow source
      description: Returns the local generated workflow.py source and current hash status for a published version.
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Generated workflow source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowVersionCodeResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflow-versions/{version_id}/regenerate-code:
    post:
      tags: [Workflow Versions]
      summary: Regenerate generated workflow code
      description: Regenerates workflow.py for a published version when code metadata or files are missing; force=true replaces existing local code.
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateWorkflowCodeRequest"
      responses:
        "200":
          description: Regeneration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateWorkflowCodeResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /generated-workflows/cleanup:
    post:
      tags: [Ops]
      summary: Cleanup unreferenced generated workflow files
      description: Removes temporary, orphan version, and empty workflow directories under backend/generated_workflows.
      parameters:
        - name: dry_run
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Cleanup report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedWorkflowCleanupResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /workflows/{workflow_id}/run:
    post:
      tags: [Runs]
      summary: Run generated local workflow code
      description: >
        Runs the local generated workflow.py referenced by workflow_versions.code_path.
        Runtime recalculates the local file hash before execution and records
        code_path_at_run, code_hash_at_run, and code_modified in workflow_runs.metadata_json.
        Hash mismatch does not block execution. Missing files, import failures, or
        missing entrypoints return workflow_code_missing, workflow_code_import_failed,
        or workflow_entrypoint_missing.
      parameters:
        - $ref: "#/components/parameters/WorkflowId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunWorkflowRequest"
      responses:
        "200":
          description: Run result or async run id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunWorkflowResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs:
    get:
      tags: [Runs]
      summary: List workflow runs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: workflow_id
          in: query
          schema:
            type: integer
            format: int64
        - name: version_id
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WorkflowRunStatus"
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs/{run_id}:
    get:
      tags: [Runs]
      summary: Get run detail
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs/{run_id}/node-runs:
    get:
      tags: [Runs]
      summary: List node runs for a workflow run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Node run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRunListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs/{run_id}/trace:
    get:
      tags: [Runs]
      summary: Get aggregated run trace
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: after_node_run_id
          in: query
          description: Return only node runs with id greater than this value.
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Aggregated trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTraceResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs/{run_id}/cancel:
    post:
      tags: [Runs]
      summary: Cancel workflow run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Cancel result
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: integer
                    format: int64
                  status:
                    $ref: "#/components/schemas/WorkflowRunStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /runs/{run_id}/retry:
    post:
      tags: [Runs]
      summary: Retry failed or cancelled workflow run
      description: Creates a new async workflow run from a failed or cancelled run, optionally overriding input.
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetryRunRequest"
      responses:
        "200":
          description: Created retry run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryRunResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /human-approval-tasks:
    get:
      tags: [Human Approvals]
      summary: List human approval tasks
      description: Lists approval tasks created by Human Approval runtime checkpoints. Submitting a pending task records the decision, moves the run back to pending, and re-enqueues it for worker resume.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/HumanApprovalTaskStatus"
        - name: workflow_id
          in: query
          schema:
            type: integer
            format: int64
        - name: run_id
          in: query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Human approval task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanApprovalTaskListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /human-approval-tasks/{task_id}:
    get:
      tags: [Human Approvals]
      summary: Get human approval task
      parameters:
        - $ref: "#/components/parameters/HumanApprovalTaskId"
      responses:
        "200":
          description: Human approval task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanApprovalTask"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /human-approval-tasks/{task_id}/submit:
    post:
      tags: [Human Approvals]
      summary: Submit a human approval decision
      description: Marks a pending task approved or rejected, writes the approval output into workflow_runs.state_json, and re-enqueues the run to continue from the saved checkpoint.
      parameters:
        - $ref: "#/components/parameters/HumanApprovalTaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitHumanApprovalRequest"
      responses:
        "200":
          description: Submitted human approval task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanApprovalTask"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /knowledge-bases:
    post:
      tags: [Knowledge Bases]
      summary: Create knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeBaseRequest"
      responses:
        "200":
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Knowledge Bases]
      summary: List knowledge bases
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Knowledge base list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /knowledge-bases/{kb_id}:
    get:
      tags: [Knowledge Bases]
      summary: Get knowledge base detail
      parameters:
        - $ref: "#/components/parameters/KnowledgeBaseId"
      responses:
        "200":
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /knowledge-bases/{kb_id}/documents:
    post:
      tags: [Documents]
      summary: Upload document to knowledge base
      parameters:
        - $ref: "#/components/parameters/KnowledgeBaseId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                metadata_json:
                  type: string
      responses:
        "200":
          description: Uploaded document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Documents]
      summary: List documents in knowledge base
      parameters:
        - $ref: "#/components/parameters/KnowledgeBaseId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DocumentStatus"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /knowledge-bases/{kb_id}/retrieve:
    post:
      tags: [Knowledge Bases]
      summary: Test knowledge retrieval
      parameters:
        - $ref: "#/components/parameters/KnowledgeBaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveKnowledgeRequest"
      responses:
        "200":
          description: Retrieved chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveKnowledgeResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /documents/{document_id}:
    get:
      tags: [Documents]
      summary: Get document detail
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Documents]
      summary: Soft delete document
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /documents/{document_id}/retry:
    post:
      tags: [Documents]
      summary: Retry document processing
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                from_stage:
                  type: string
                  example: embedding
      responses:
        "200":
          description: Retry result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /tools:
    post:
      tags: [Tools]
      summary: Create tool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
      responses:
        "200":
          description: Tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Tools]
      summary: List tools
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: type
          in: query
          schema:
            type: string
            enum: [api]
      responses:
        "200":
          description: Tool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /tools/{tool_id}:
    get:
      tags: [Tools]
      summary: Get tool detail
      parameters:
        - $ref: "#/components/parameters/ToolId"
      responses:
        "200":
          description: Tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        default:
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Tools]
      summary: Update tool
      parameters:
        - $ref: "#/components/parameters/ToolId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
      responses:
        "200":
          description: Tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /tools/{tool_id}/test:
    post:
      tags: [Tools]
      summary: Test tool
      parameters:
        - $ref: "#/components/parameters/ToolId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestToolRequest"
      responses:
        "200":
          description: Tool test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestToolResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /model-providers:
    get:
      tags: [Models]
      summary: List model providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModelProvider"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /model-configs:
    get:
      tags: [Models]
      summary: List model configs
      parameters:
        - name: provider_id
          in: query
          schema:
            type: integer
            format: int64
        - name: model_type
          in: query
          schema:
            type: string
            enum: [chat, embedding, rerank]
      responses:
        "200":
          description: Model config list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModelConfig"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /secrets:
    post:
      tags: [Secrets]
      summary: Create secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSecretRequest"
      responses:
        "200":
          description: Secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Secrets]
      summary: List secrets without values
      responses:
        "200":
          description: Secret list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Secret"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /secrets/{secret_id}:
    put:
      tags: [Secrets]
      summary: Update secret
      parameters:
        - name: secret_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSecretRequest"
      responses:
        "200":
          description: Secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /node-types:
    get:
      tags: [Node Types]
      summary: List node types
      responses:
        "200":
          description: Node type list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NodeTypeSummary"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /node-types/{node_type}/schema:
    get:
      tags: [Node Types]
      summary: Get node type schema
      parameters:
        - name: node_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NodeType"
      responses:
        "200":
          description: Node schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeTypeSchema"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/workers:
    get:
      tags: [Ops]
      summary: List active workflow workers
      description: Returns recent worker heartbeat records for async workflow execution.
      parameters:
        - name: active_seconds
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 86400
            default: 120
      responses:
        "200":
          description: Active worker list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsWorkersResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/queues:
    get:
      tags: [Ops]
      summary: Get workflow run queue depths
      description: Returns Redis queue depths for the workflow run main, processing, and dead-letter queues.
      responses:
        "200":
          description: Workflow queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsQueueStatus"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/queues/workflow_runs/dead:
    get:
      tags: [Ops]
      summary: List workflow run dead-letter jobs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Dead-letter workflow run jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsDeadWorkflowRunJobsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/queues/workflow_runs/recover:
    post:
      tags: [Ops]
      summary: Recover workflow run queues
      description: Requeues stale pending jobs, acknowledges terminal processing jobs, and fails stale running workflow runs.
      responses:
        "200":
          description: Recovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsWorkflowRunRecoveryResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/workflow_runs/failed:
    get:
      tags: [Ops]
      summary: List failed workflow runs
      description: Returns failed workflow_runs for Ops recovery and troubleshooting.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Failed workflow run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsFailedWorkflowRunsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /ops/workflow_runs/{run_id}/recover:
    post:
      tags: [Ops]
      summary: Recover one workflow run
      description: Requeues a failed, stale, or dead-letter workflow run. Completed, normal running, normal pending, and cancelled runs are not requeued.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Single run recovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsSingleWorkflowRunRecoveryResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    WorkflowId:
      name: workflow_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    HumanApprovalTaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    KnowledgeBaseId:
      name: kb_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ToolId:
      name: tool_id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    JsonObject:
      type: object
      additionalProperties: true

    Timestamp:
      type: string
      format: date-time

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable application error code. Runtime/model/API errors include workflow_code_missing, workflow_code_import_failed, workflow_entrypoint_missing, model_api_key_missing, model_request_failed, model_response_invalid, model_timeout, api_response_error, api_request_error, and response_too_large.
            message:
              type: string
            details:
              $ref: "#/components/schemas/JsonObject"
        request_id:
          type: string

    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
          example:
            database: ok
            redis: ok
            encryption_key: ok
            default_model_provider: ok

    OpsWorker:
      type: object
      required: [worker_id, worker_type, queue_name, status, last_seen_at]
      properties:
        worker_id:
          type: string
        worker_type:
          type: string
          example: workflow
        queue_name:
          type: string
          example: workflow_runs
        status:
          type: string
          enum: [idle, busy, stopping, error]
        current_run_id:
          type: integer
          format: int64
          nullable: true
        current_job_id:
          type: string
          nullable: true
        hostname:
          type: string
          nullable: true
        pid:
          type: integer
          nullable: true
        metadata_json:
          $ref: "#/components/schemas/JsonObject"
        last_seen_at:
          $ref: "#/components/schemas/Timestamp"
        last_seen_epoch:
          type: integer
          format: int64

    OpsWorkersResponse:
      type: object
      required: [workers, metadata]
      properties:
        workers:
          type: array
          items:
            $ref: "#/components/schemas/OpsWorker"
        metadata:
          type: object
          required: [table_exists, active_seconds]
          properties:
            table_exists:
              type: boolean
            active_seconds:
              type: integer

    OpsQueueStatus:
      type: object
      required: [queue_name, main_depth, processing_depth, dead_letter_depth]
      properties:
        queue_name:
          type: string
          example: workflow_runs
        main_depth:
          type: integer
          minimum: 0
        processing_depth:
          type: integer
          minimum: 0
        dead_letter_depth:
          type: integer
          minimum: 0

    OpsDeadWorkflowRunJobsResponse:
      type: object
      required: [queue_name, limit, items]
      properties:
        queue_name:
          type: string
          example: workflow_runs
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/JsonObject"

    OpsWorkflowRunRecoveryResponse:
      type: object
      required: [processing_jobs, stale_workflow_runs]
      properties:
        processing_jobs:
          type: object
          required: [requeued, acked_terminal, skipped_running, invalid_payloads]
          properties:
            requeued:
              type: array
              items:
                type: integer
                format: int64
            acked_terminal:
              type: array
              items:
                type: integer
                format: int64
            skipped_running:
              type: array
              items:
                type: integer
                format: int64
            invalid_payloads:
              type: integer
        stale_workflow_runs:
          type: object
          required: [requeued, failed, requeue_errors]
          properties:
            requeued:
              type: array
              items:
                type: integer
                format: int64
            failed:
              type: array
              items:
                type: integer
                format: int64
            requeue_errors:
              type: array
              items:
                $ref: "#/components/schemas/JsonObject"

    OpsFailedWorkflowRun:
      type: object
      required: [run_id, workflow_id, workflow_version_id, status, created_at, updated_at]
      properties:
        run_id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        workflow_version_id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    OpsFailedWorkflowRunsResponse:
      type: object
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OpsFailedWorkflowRun"
        count:
          type: integer

    OpsSingleWorkflowRunRecoveryResponse:
      type: object
      required: [run_id, status, recovered, reason, queued]
      properties:
        run_id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
        recovered:
          type: boolean
        reason:
          type: string
          enum: [failed, dead_letter, stale, already_completed, already_running, already_pending, cancelled]
        queued:
          type: boolean

    WorkflowStatus:
      type: string
      enum: [draft, published, archived]

    WorkflowRunStatus:
      type: string
      enum: [pending, running, waiting_approval, completed, failed, cancelled]

    NodeRunStatus:
      type: string
      enum: [running, success, failed, skipped, retrying, waiting_approval]

    NodeType:
      type: string
      enum: [start, input, llm, knowledge_base, intent, branch, human_approval, set_variable, api, message, output, end]

    WorkflowGraph:
      type: object
      required: [schema_version, nodes, edges]
      properties:
        schema_version:
          type: string
          example: "1.0"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"

    WorkflowNode:
      type: object
      required: [id, type, name, position, config]
      properties:
        id:
          type: string
          example: llm_1
        type:
          $ref: "#/components/schemas/NodeType"
        name:
          type: string
        description:
          type: string
        position:
          type: object
          required: [x, y]
          properties:
            x:
              type: number
            y:
              type: number
        input_mapping:
          $ref: "#/components/schemas/JsonObject"
        output_mapping:
          $ref: "#/components/schemas/JsonObject"
        config:
          $ref: "#/components/schemas/JsonObject"
        retry:
          $ref: "#/components/schemas/RetryPolicy"
        timeout:
          type: integer
          example: 60
        on_error:
          $ref: "#/components/schemas/OnErrorPolicy"
        enabled:
          type: boolean
          default: true

    WorkflowEdge:
      type: object
      required: [id, source, target]
      properties:
        id:
          type: string
        source:
          type: string
        target:
          type: string
        label:
          type: string
        condition:
          nullable: true
          oneOf:
            - type: string
            - $ref: "#/components/schemas/JsonObject"

    RetryPolicy:
      type: object
      properties:
        max_attempts:
          type: integer
          minimum: 1
          default: 1
        backoff:
          type: string
          enum: [none, fixed, exponential]
          default: none
        retry_on:
          type: array
          items:
            type: string

    OnErrorPolicy:
      type: object
      properties:
        strategy:
          type: string
          enum: [fail_workflow, skip_node, go_to_node]
          default: fail_workflow
        target:
          type: string

    CreateWorkflowRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        draft_graph_json:
          $ref: "#/components/schemas/WorkflowGraph"

    UpdateWorkflowRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        draft_graph_json:
          $ref: "#/components/schemas/WorkflowGraph"

    WorkflowDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        current_version_id:
          type: integer
          format: int64
          nullable: true
        draft_graph_json:
          $ref: "#/components/schemas/WorkflowGraph"
        created_by:
          type: integer
          format: int64
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"

    WorkflowListItem:
      allOf:
        - $ref: "#/components/schemas/WorkflowDetail"
        - type: object
          properties:
            current_version:
              type: integer
              nullable: true
            latest_run:
              type: object
              nullable: true
              properties:
                run_id:
                  type: integer
                  format: int64
                status:
                  $ref: "#/components/schemas/WorkflowRunStatus"
                created_at:
                  $ref: "#/components/schemas/Timestamp"

    WorkflowListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowListItem"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    ValidateGraphRequest:
      type: object
      required: [mode, graph_json]
      properties:
        mode:
          type: string
          enum: [draft, publish, run]
        graph_json:
          $ref: "#/components/schemas/WorkflowGraph"

    GraphValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/GraphValidationIssue"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/GraphValidationIssue"

    GraphValidationIssue:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        node_id:
          type: string
          nullable: true

    PublishWorkflowRequest:
      type: object
      properties:
        release_note:
          type: string

    RegenerateWorkflowCodeRequest:
      type: object
      properties:
        force:
          type: boolean
          default: false

    PublishWorkflowResponse:
      type: object
      properties:
        workflow_id:
          type: integer
          format: int64
        version_id:
          type: integer
          format: int64
        version:
          type: integer
        schema_version:
          type: string
        code_path:
          type: string
          description: Relative path to the generated workflow.py file.
          example: backend/generated_workflows/workflow_000001/v000001/workflow.py
        code_hash:
          type: string
          description: Hash of the generated workflow.py at publish time.
        code_generated_at:
          $ref: "#/components/schemas/Timestamp"
        created_at:
          $ref: "#/components/schemas/Timestamp"

    WorkflowVersionSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        version:
          type: integer
        schema_version:
          type: string
        release_note:
          type: string
        published_by:
          type: integer
          format: int64
        code_path:
          type: string
          description: Relative path to the generated workflow.py file.
          example: backend/generated_workflows/workflow_000001/v000001/workflow.py
        code_hash:
          type: string
          description: Hash of the generated workflow.py recorded at publish time.
        code_hash_actual:
          type: string
          nullable: true
          description: Current local workflow.py hash when inspected.
        code_modified:
          type: boolean
          description: Whether the local workflow.py hash differs from the published hash.
        code_status:
          type: string
          enum: [ok, modified, missing_metadata, missing_file, invalid_path]
        code_generated_at:
          $ref: "#/components/schemas/Timestamp"
        created_at:
          $ref: "#/components/schemas/Timestamp"

    WorkflowVersionDetail:
      allOf:
        - $ref: "#/components/schemas/WorkflowVersionSummary"
        - type: object
          properties:
            graph_json:
              $ref: "#/components/schemas/WorkflowGraph"

    WorkflowVersionCodeResponse:
      type: object
      required: [id, workflow_id, version, code_path, code_status, source]
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        version:
          type: integer
        schema_version:
          type: string
        code_path:
          type: string
        code_hash:
          type: string
          nullable: true
        code_hash_actual:
          type: string
          nullable: true
        code_modified:
          type: boolean
        code_status:
          type: string
          enum: [ok, modified, missing_metadata, missing_file, invalid_path]
        code_generated_at:
          $ref: "#/components/schemas/Timestamp"
        source:
          type: string

    RegenerateWorkflowCodeResponse:
      allOf:
        - $ref: "#/components/schemas/WorkflowVersionDetail"
        - type: object
          properties:
            regenerated:
              type: boolean
            previous_code_status:
              type: string
              enum: [ok, modified, missing_metadata, missing_file, invalid_path]

    GeneratedWorkflowCleanupResponse:
      type: object
      required:
        - dry_run
        - removed_temp_dirs
        - removed_orphan_version_dirs
        - removed_empty_workflow_dirs
        - kept_version_dirs
        - removed_total
        - kept_total
      properties:
        dry_run:
          type: boolean
        removed_temp_dirs:
          type: array
          items:
            type: string
        removed_orphan_version_dirs:
          type: array
          items:
            type: string
        removed_empty_workflow_dirs:
          type: array
          items:
            type: string
        kept_version_dirs:
          type: array
          items:
            type: string
        removed_total:
          type: integer
        kept_total:
          type: integer

    WorkflowVersionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowVersionSummary"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    RunWorkflowRequest:
      type: object
      required: [input]
      properties:
        input:
          $ref: "#/components/schemas/JsonObject"
        version_id:
          type: integer
          format: int64
        trigger_type:
          type: string
          enum: [manual, api, test]
          default: manual
        execution_mode:
          type: string
          enum: [sync, async]
          default: sync

    RetryRunRequest:
      type: object
      properties:
        input:
          $ref: "#/components/schemas/JsonObject"
        reason:
          type: string
          maxLength: 500

    RunWorkflowResponse:
      type: object
      properties:
        run_id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
        output:
          $ref: "#/components/schemas/JsonObject"
        started_at:
          $ref: "#/components/schemas/Timestamp"
        ended_at:
          $ref: "#/components/schemas/Timestamp"

    RetryRunResponse:
      allOf:
        - $ref: "#/components/schemas/RunWorkflowResponse"
        - type: object
          properties:
            retry_of_run_id:
              type: integer
              format: int64

    HumanApprovalTaskStatus:
      type: string
      enum: [pending, approved, rejected, cancelled, expired]

    HumanApprovalDecision:
      type: string
      enum: [approve, reject]

    SubmitHumanApprovalRequest:
      type: object
      required: [decision]
      properties:
        decision:
          $ref: "#/components/schemas/HumanApprovalDecision"
        response:
          $ref: "#/components/schemas/JsonObject"
        comment:
          type: string
          maxLength: 1000
          nullable: true

    HumanApprovalTask:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        run_id:
          type: integer
          format: int64
        node_id:
          type: string
        node_name:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/HumanApprovalTaskStatus"
        decision:
          $ref: "#/components/schemas/HumanApprovalDecision"
          nullable: true
        input_json:
          $ref: "#/components/schemas/JsonObject"
        response_json:
          $ref: "#/components/schemas/JsonObject"
        metadata_json:
          $ref: "#/components/schemas/JsonObject"
        resume_supported:
          type: boolean
          description: True when the submitted task re-enqueues the workflow run for resume.
        resume_enqueued:
          type: boolean
          description: True when the workflow run was pushed back to the worker queue.
        requested_by:
          type: integer
          format: int64
          nullable: true
        decided_by:
          type: integer
          format: int64
          nullable: true
        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
        decided_at:
          $ref: "#/components/schemas/Timestamp"
        expires_at:
          $ref: "#/components/schemas/Timestamp"

    HumanApprovalTaskListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HumanApprovalTask"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    WorkflowRunDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workflow_id:
          type: integer
          format: int64
        version_id:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/WorkflowRunStatus"
        trigger_type:
          type: string
        input_json:
          $ref: "#/components/schemas/JsonObject"
        output_json:
          $ref: "#/components/schemas/JsonObject"
        state_json:
          $ref: "#/components/schemas/JsonObject"
        metadata_json:
          $ref: "#/components/schemas/JsonObject"
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        started_at:
          $ref: "#/components/schemas/Timestamp"
        ended_at:
          $ref: "#/components/schemas/Timestamp"
        created_at:
          $ref: "#/components/schemas/Timestamp"

    WorkflowRunListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunDetail"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    NodeRun:
      type: object
      properties:
        id:
          type: integer
          format: int64
        run_id:
          type: integer
          format: int64
        node_id:
          type: string
        node_type:
          $ref: "#/components/schemas/NodeType"
        node_name:
          type: string
        status:
          $ref: "#/components/schemas/NodeRunStatus"
        attempt:
          type: integer
        input_json:
          $ref: "#/components/schemas/JsonObject"
        output_json:
          $ref: "#/components/schemas/JsonObject"
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        duration_ms:
          type: integer
        metadata_json:
          $ref: "#/components/schemas/JsonObject"
        started_at:
          $ref: "#/components/schemas/Timestamp"
        ended_at:
          $ref: "#/components/schemas/Timestamp"

    NodeRunListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NodeRun"

    RunTraceResponse:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/WorkflowRunDetail"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRun"
        graph_json:
          $ref: "#/components/schemas/WorkflowGraph"

    KnowledgeBase:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        status:
          type: string
        embedding_model:
          type: string
        embedding_dim:
          type: integer
          enum: [1536]
          default: 1536
        tokenizer:
          type: string
          default: cl100k_base
        slug:
          type: string
          nullable: true
